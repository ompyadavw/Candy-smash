<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Candy Smash</title> 
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#241531;
    --bg-deep2:#2D1B3D;
    --panel:#3A2450;
    --panel-edge:#4D3168;
    --pink:#FF6B9D;
    --orange:#FFA552;
    --mint:#5FE3A6;
    --yellow:#FFD93D;
    --purple:#A78BFA;
    --red:#FF5757;
    --cream:#FFF6EC;
    --shadow:rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 20% 10%, #3a2452 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, #34204a 0%, transparent 50%),
      var(--bg-deep2);
    font-family:'Fredoka', sans-serif;
    color:var(--cream);
    overflow-x:hidden;
    touch-action:manipulation;
  }
  .wrap{
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:18px 14px 30px;
    max-width:480px; margin:0 auto;
  }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 8vw, 38px);
    margin:4px 0 2px;
    letter-spacing:0.5px;
    background:linear-gradient(135deg, var(--pink), var(--yellow) 55%, var(--mint));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-align:center;
    text-shadow:none;
  }
  .tagline{
    font-size:13px;
    opacity:0.6;
    margin-bottom:14px;
    letter-spacing:0.3px;
  }
  .hud{
    width:100%;
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }
  .stat{
    flex:1;
    background:linear-gradient(160deg, var(--panel), var(--panel-edge));
    border-radius:16px;
    padding:10px 12px;
    text-align:center;
    box-shadow:0 4px 0 var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    position:relative;
  }
  .stat .label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    opacity:0.55;
    font-weight:500;
  }
  .stat .value{
    font-family:'Baloo 2', sans-serif;
    font-size:22px;
    font-weight:700;
    margin-top:2px;
  }
  .stat.moves .value{ color:var(--orange); }
  .stat.score .value{ color:var(--mint); }
  .stat.target .value{ color:var(--pink); }

  .goal-row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(0,0,0,0.18);
    border-radius:14px;
    padding:8px 14px;
    margin-bottom:14px;
    font-size:13px;
  }
  .goal-row .lvl{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    color:var(--yellow);
  }

  #board{
    display:grid;
    gap:5px;
    background:linear-gradient(160deg, #1d1129, #28173a);
    padding:8px;
    border-radius:20px;
    box-shadow:
      0 8px 0 var(--shadow),
      inset 0 2px 6px rgba(0,0,0,0.5),
      inset 0 -2px 0 rgba(255,255,255,0.04);
    touch-action:none;
  }
  .cell{
    width:42px; height:42px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:25px;
    cursor:pointer;
    position:relative;
    transition:transform 0.15s ease;
    background:rgba(255,255,255,0.03);
    touch-action:none;
  }
  .cell.candy{
    box-shadow:
      0 3px 0 rgba(0,0,0,0.25),
      inset 0 2px 3px rgba(255,255,255,0.45),
      inset 0 -3px 4px rgba(0,0,0,0.18);
  }
  .cell.selected{
    transform:scale(1.12);
    box-shadow:0 0 0 3px var(--cream), 0 3px 0 rgba(0,0,0,0.25);
    z-index:2;
  }
  .cell.matched{
    animation:pop 0.35s ease forwards;
  }
  .cell.falling{
    animation:none;
  }
  @keyframes pop{
    0%{ transform:scale(1); opacity:1; }
    60%{ transform:scale(1.35); opacity:0.7; }
    100%{ transform:scale(0.2); opacity:0; }
  }
  @keyframes dropIn{
    0%{ transform:translateY(-46px); opacity:0; }
    70%{ opacity:1; }
    100%{ transform:translateY(0); opacity:1; }
  }
  .cell.drop{
    animation:dropIn 0.32s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-4px); }
    75%{ transform:translateX(4px); }
  }
  .cell.invalid{ animation:shake 0.25s ease; }

  .c0{ background:radial-gradient(circle at 32% 28%, #ff9bbd, var(--pink) 70%); }
  .c1{ background:radial-gradient(circle at 32% 28%, #ffc98a, var(--orange) 70%); }
  .c2{ background:radial-gradient(circle at 32% 28%, #9af5cb, var(--mint) 70%); }
  .c3{ background:radial-gradient(circle at 32% 28%, #fff0a0, var(--yellow) 70%); }
  .c4{ background:radial-gradient(circle at 32% 28%, #d4c4ff, var(--purple) 70%); }
  .c5{ background:radial-gradient(circle at 32% 28%, #ffa3a3, var(--red) 70%); }

  .footer-msg{
    margin-top:16px;
    font-size:13px;
    opacity:0.55;
    text-align:center;
    min-height:18px;
  }

  .combo-pop{
    position:absolute;
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:14px;
    color:var(--yellow);
    pointer-events:none;
    animation:floatUp 0.7s ease forwards;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
    z-index:5;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-30px); opacity:0; }
  }

  .overlay{
    position:fixed; inset:0;
    background:rgba(20,10,30,0.78);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:linear-gradient(160deg, var(--panel), var(--panel-edge));
    border-radius:22px;
    padding:28px 24px;
    text-align:center;
    max-width:320px;
    box-shadow:0 10px 0 var(--shadow);
  }
  .modal h2{
    font-family:'Baloo 2',sans-serif;
    font-size:26px;
    margin:0 0 8px;
    color:var(--yellow);
  }
  .modal p{
    font-size:14px;
    opacity:0.8;
    margin:0 0 18px;
    line-height:1.5;
  }
  .btn{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:16px;
    border:none;
    border-radius:14px;
    padding:12px 28px;
    background:linear-gradient(135deg, var(--pink), var(--purple));
    color:white;
    box-shadow:0 4px 0 rgba(0,0,0,0.3);
    cursor:pointer;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.3); }

  @media (max-width:360px){
    .cell{ width:36px; height:36px; font-size:21px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Candy Smash</h1>
  <div class="tagline">Match 3 ya zyada candies milao!</div>

  <div class="hud">
    <div class="stat moves">
      <div class="label">Moves</div>
      <div class="value" id="movesVal">20</div>
    </div>
    <div class="stat score">
      <div class="label">Score</div>
      <div class="value" id="scoreVal">0</div>
    </div>
    <div class="stat target">
      <div class="label">Target</div>
      <div class="value" id="targetVal">800</div>
    </div>
  </div>

  <div class="goal-row">
    <span><span class="lvl" id="lvlVal">Level 1</span></span>
    <span id="statusMsg">Khelna shuru karo! 🍬</span>
  </div>

  <div id="board"></div>

  <div class="footer-msg">Do candies tap karke swap karo (adjacent hone chahiye)</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Level Complete! 🎉</h2>
    <p id="modalText">Bahut badhiya khela!</p>
    <button class="btn" id="modalBtn">Next Level</button>
  </div>
</div>

<script>
(function(){
  const SIZE = 8;
  const COLORS = 6;
  const board = document.getElementById('board');
  const movesVal = document.getElementById('movesVal');
  const scoreVal = document.getElementById('scoreVal');
  const targetVal = document.getElementById('targetVal');
  const lvlVal = document.getElementById('lvlVal');
  const statusMsg = document.getElementById('statusMsg');
  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const modalBtn = document.getElementById('modalBtn');

  board.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;

  let grid = [];
  let level = 1;
  let moves = 20;
  let score = 0;
  let target = 800;
  let selected = null;
  let busy = false;

  function randColor(){ return Math.floor(Math.random()*COLORS); }

  function cellEl(r,c){ return board.querySelector(`[data-r="${r}"][data-c="${c}"]`); }

  function buildGridData(){
    grid = [];
    for(let r=0;r<SIZE;r++){
      const row=[];
      for(let c=0;c<SIZE;c++){
        let color;
        do{
          color = randColor();
        } while(
          (c>=2 && row[c-1]===color && row[c-2]===color) ||
          (r>=2 && grid[r-1][c]===color && grid[r-2][c]===color)
        );
        row.push(color);
      }
      grid.push(row);
    }
  }

  function renderAll(){
    board.innerHTML='';
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const div = document.createElement('div');
        div.className = `cell candy c${grid[r][c]}`;
        div.dataset.r = r;
        div.dataset.c = c;
        div.addEventListener('pointerdown', onCellClick);
        board.appendChild(div);
      }
    }
  }

  function onCellClick(e){
    if(busy) return;
    const r = parseInt(e.currentTarget.dataset.r);
    const c = parseInt(e.currentTarget.dataset.c);

    if(!selected){
      selected = {r,c};
      e.currentTarget.classList.add('selected');
      return;
    }

    const prevEl = cellEl(selected.r, selected.c);
    if(selected.r===r && selected.c===c){
      prevEl.classList.remove('selected');
      selected = null;
      return;
    }

    const isAdjacent = (Math.abs(selected.r-r)+Math.abs(selected.c-c))===1;
    prevEl.classList.remove('selected');

    if(!isAdjacent){
      selected = {r,c};
      e.currentTarget.classList.add('selected');
      return;
    }

    const a = {...selected};
    const b = {r,c};
    selected = null;
    attemptSwap(a,b);
  }

  function swapData(a,b){
    const tmp = grid[a.r][a.c];
    grid[a.r][a.c] = grid[b.r][b.c];
    grid[b.r][b.c] = tmp;
  }

  function findMatches(){
    const matched = Array.from({length:SIZE},()=>Array(SIZE).fill(false));
    // horizontal
    for(let r=0;r<SIZE;r++){
      let runStart=0;
      for(let c=1;c<=SIZE;c++){
        if(c<SIZE && grid[r][c]===grid[r][runStart] && grid[r][c]!==-1){
          continue;
        }
        const runLen = c - runStart;
        if(runLen>=3){
          for(let k=runStart;k<c;k++) matched[r][k]=true;
        }
        runStart = c;
      }
    }
    // vertical
    for(let c=0;c<SIZE;c++){
      let runStart=0;
      for(let r=1;r<=SIZE;r++){
        if(r<SIZE && grid[r][c]===grid[runStart][c] && grid[r][c]!==-1){
          continue;
        }
        const runLen = r - runStart;
        if(runLen>=3){
          for(let k=runStart;k<r;k++) matched[k][c]=true;
        }
        runStart = r;
      }
    }
    return matched;
  }

  function hasAnyMatch(matched){
    return matched.some(row=>row.some(v=>v));
  }

  function attemptSwap(a,b){
    swapData(a,b);
    const matched = findMatches();
    if(!hasAnyMatch(matched)){
      // invalid move - swap back with shake feedback
      swapData(a,b);
      const elA = cellEl(a.r,a.c);
      const elB = cellEl(b.r,b.c);
      elA.classList.add('invalid');
      elB.classList.add('invalid');
      setTimeout(()=>{
        elA.classList.remove('invalid');
        elB.classList.remove('invalid');
      },260);
      return;
    }
    moves--;
    movesVal.textContent = moves;
    busy = true;
    renderAll(); // reflect swap visually before resolving
    resolveMatches(1);
  }

  function resolveMatches(comboMult){
    const matched = findMatches();
    if(!hasAnyMatch(matched)){
      busy = false;
      checkEndState();
      return;
    }

    let cleared = 0;
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        if(matched[r][c]){
          cleared++;
          const el = cellEl(r,c);
          if(el) el.classList.add('matched');
          grid[r][c] = -1;
        }
      }
    }
    const gained = cleared * 10 * comboMult;
    score += gained;
    scoreVal.textContent = score;

    if(comboMult>1){
      statusMsg.textContent = `Combo x${comboMult}! 🔥`;
    } else {
      statusMsg.textContent = `+${gained} points!`;
    }

    setTimeout(()=>{
      collapseAndFill();
      renderAll();
      setTimeout(()=>{
        resolveMatches(comboMult+1);
      }, 80);
    }, 320);
  }

  function collapseAndFill(){
    for(let c=0;c<SIZE;c++){
      let pointer = SIZE-1;
      for(let r=SIZE-1;r>=0;r--){
        if(grid[r][c] !== -1){
          grid[pointer][c] = grid[r][c];
          if(pointer!==r) grid[r][c] = -1;
          pointer--;
        }
      }
      for(let r=pointer;r>=0;r--){
        grid[r][c] = randColor();
      }
    }
  }

  function checkEndState(){
    if(score >= target){
      modalTitle.textContent = 'Level Complete! 🎉';
      modalText.textContent = `Score: ${score} — Target paar kar diya!`;
      modalBtn.textContent = 'Next Level';
      overlay.classList.add('show');
      statusMsg.textContent = 'Shabaash! 🌟';
    } else if(moves<=0){
      modalTitle.textContent = 'Game Over 😅';
      modalText.textContent = `Score: ${score} / ${target}. Phir try karo!`;
      modalBtn.textContent = 'Retry';
      overlay.classList.add('show');
      statusMsg.textContent = 'Moves khatam ho gaye';
    } else {
      statusMsg.textContent = 'Agla move chuno...';
    }
  }

  modalBtn.addEventListener('click', ()=>{
    overlay.classList.remove('show');
    if(score>=target){
      level++;
      target = Math.round(target * 1.4);
      moves = 20 + level;
    } else {
      moves = 20 + (level-1);
    }
    score = 0;
    lvlVal.textContent = `Level ${level}`;
    movesVal.textContent = moves;
    scoreVal.textContent = score;
    targetVal.textContent = target;
    statusMsg.textContent = 'Khelna shuru karo! 🍬';
    initBoardNoMatches();
    renderAll();
  });

  function initBoardNoMatches(){
    buildGridData();
  }

  // init
  initBoardNoMatches();
  renderAll();
})();
</script>
</body>
</html>
